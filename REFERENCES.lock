taken = "Pin decision: icon4py 0.2.0 is the latest tagged release and every subpackage distribution (icon4py-common, icon4py-atmosphere-{advection,diffusion,dycore,microphysics,muphys}, icon4py-driver, icon4py-standalone-driver, icon4py-testing, icon4py-tools) is published on PyPI at 0.2.0. Its published metadata pins gt4py==1.1.10 exactly, so that is the tested pair. Import root verified as icon4py.model.common. GPU extra spelling: icon4py-common[cuda12] -> cupy-cuda12x>=13.0 + gt4py[cuda12]. Symbolic names used by later SPECs: icon4py.common -> icon4py-common, icon4py.dycore -> icon4py-atmosphere-dycore, etc. Repo HEAD at mining time (7341a32954d6db5d982fe3d69363f63198844cf2) pins gt4py==1.1.11; we pin the released pair, not HEAD."
step = "S01"
date = "2026-07-08"

