taken = "The satad granule S07 wraps: SaturationAdjustment(config, grid, vertical_params, metric_state, backend) with SaturationAdjustmentConfig(max_iter=10, tolerance=1e-3 — 'in ICON, 10/1.e-3 are always used when satad_v_3D is called'). run(dtime, rho, temperature, qv, qc, temperature_tendency, qv_tendency, qc_tendency) mutates the three *_tendency fields in place on the domain [start_index(Cell NUDGING):end_index(Cell LOCAL)] x [vertical_params.kstart_moist:grid.num_levels]; outside that domain the tendency fields are NOT written (granule allocates them zeroed in its own test). Host-side while-loop over 3 pointwise gt4py programs + TimeStepPair swap; ConvergenceError raised past max_iter. Formulation is T-based (temperature/qv/qc/rho), NOT theta_v/exner — the granule is 'originally inspired from satad_v_3D of ICON' and uses cvd bookkeeping: lwdocvd = latent_heat_vaporization(T)/cvd (PLAN pitfall confirmed: no cpd conversion anywhere). Newton: f(T)=T-T0+lwdocvd*(qsat_rho(T,rho)-qv), f'(T)=1+lwdocvd*dqsatdT_rho; subsaturated shortcut T_test=T-lwdocvd*qc when qv+qc<=qsat_rho(T_test,rho); tendency egress ((T_new-T)/dt, (qsat-qv)/dt, (max(qv+qc-qsat, zqwmin=1e-20)-qc)/dt). Thermo closures (microphysical_processes.py): Tetens psat=610.78*exp(17.269*(T-273.15)/(T-35.86)); qsat_rho=psat/(rho*rv*T); dqsatdT_rho=qsat*((tmelt-bw)*aw/(T-bw)^2-1/T); latent_heat_vaporization L(T)=2.5008e6+(1850.0-cpl)*(T-tmelt)-rv*T (Kirchhoff; 1850.0 is a local cpv-like literal distinct from cpv=1869.46). PhysicsConstants.cvd=cpd-rd with cpd=1004.64, rd=287.04 == symcon.icon._constants.CVD bitwise; SPECIFIC_HEAT_CAPACITY_ICE=2108.0 (S06 flag) is NOT used by satad — no ice/cpi term anywhere in the granule, so the S06 ci disagreement does not touch S07. metric_state.ddqz_z_full is stored but never used by run() at v0.2.0 -> not a property-contract input of the symcon component (dummy zeros suffice). model_options.setup_program(backend=None) = embedded path (skips compile); grid contract consumed: num_levels, size dict, start_index/end_index callables (simple.py precedent: start=0/end=size zone-independent factory for non-halo zones, connectivities may be {} for these pointwise stencils). data_allocation.zero_field/import_array_ns for device-generic allocation."
