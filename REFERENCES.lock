date = "2026-07-09"

[[ref]]
id = "sympl-oop"
url = "https://github.com/stubbiali/sympl"
commit = "5491978331ef7d6b7dc7995b9a5726713b5de7a7"  # branch oop
paths = ["sympl/_core/factory.py", "sympl/_core/static_checkers.py", "sympl/_core/dynamic_checkers.py", "sympl/_core/dynamic_operators.py", "sympl/_core/units.py"]
taken = "Checker/Operator/Factory mechanisms ported as semantics (thesis Fig. 3.5): MetaFactory registers subclasses on class creation keyed by class attr `name`, duplicate name -> error, Factory.factory(name) resolves through per-base subregistry with informative error on unknown name. Static checkers validate property dicts from definitions only (dict type, units present, dims present, alias bijectivity); dynamic checkers cross definitions with actual data (missing/extra fields, actual-vs-target dims, dim-length consistency) with errors naming field + component. Dynamic operators own target-dims resolution and raw-field extraction. lru_cache on the pint registry call = the cached identity check pattern."
step = "S02"
date = "2026-07-09"

