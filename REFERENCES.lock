paths = ["sympl/_core/units.py", "sympl/_core/time.py", "sympl/_core/dataarray.py"]
taken = "Upstream property/units semantics: pint UnitRegistry with %/degree cleanup and degrees_north/degrees_east/percent definitions; units_are_same == identity via registry equality (1 K vs 2 K compare unequal quantities -> non-identity); cftime-aware datetime() factory keyed by calendar string ('proleptic_gregorian' -> stdlib datetime, else cftime.Datetime* classes). symcon drops the implicit any-unit conversion path (data_array_to_units) in favor of canonical units + strict mode."
