[[ref]]
id = "sympl-oop"
url = "https://github.com/stubbiali/sympl"
commit = "5491978331ef7d6b7dc7995b9a5726713b5de7a7"  # branch oop
paths = ["sympl/_core/core_components.py", "sympl/_core/steppers.py", "sympl/_core/wrappers.py", "sympl/_core/monitors.py", "sympl/_core/base_component.py"]
taken = "Ubbiali component ABI shapes (thesis SS4.1-4.2 via architecture doc): __call__ with caller-provided out DataArray dicts; array_call receiving BOTH input and output raw-buffer dicts and writing in place; allocate_diagnostic/allocate_tendency/allocate_output hooks invoked exactly for the output fields the caller did not provide; call sequence = inflow checks -> raw extract -> out checks -> allocate missing -> array_call -> outflow checks -> DataArray wrap (checks skippable via enable_checks; symcon routes them through S02 Static/DynamicChecker + Ingress/EgressPlan instead). UpdateFrequencyWrapper = CallingFrequency donor: fires when state['time'] >= last_update_time + update_timedelta, else returns cached output verbatim; last_update_time is the phase. ScalingWrapper: per-category scale-factor dicts validated against the wrapped component's property dicts at construction, inputs scaled into attr-preserving copies, outputs/tendencies/diagnostics scaled after the call, __getattr__ delegation. Monitor base = abstract store(state). symcon deviations: single flat out= mapping instead of out_tendencies/out_diagnostics/out_state (SPEC S03 frozen interface), timestep passed into array_call uniformly, tendencies_in_diagnostics/TracerPacker not ported (out of S03 scope)."
step = "S03"
date = "2026-07-09"

[[ref]]
id = "sympl"
url = "https://github.com/mcgibbon/sympl"
commit = "512809ef35d2daf898b8747a717271ed4d2b684d"
paths = ["sympl/_components/netcdf.py", "sympl/_core/wrappers.py", "docs/timestepping.rst", "docs/monitors.rst"]
taken = "NetCDFMonitor semantics donor: Monitor caching stored states keyed by time and writing one NetCDF file, store_names selection of a variable subset, write_on_store synchronous mode, aliases out of scope. symcon S03 keeps the store(state)->one-file contract but reimplements xarray-based (dependency: netcdf4 engine) with a full-file rewrite per store (T0-dumb) and provenance global attrs. Upstream UpdateFrequencyWrapper cross-checked against the oop fork (identical firing rule). Docs quickstart/timestepping give the paper Fig.1/Fig.2 usage pattern reproduced by the S03 acceptance test: standalone diagnostic call; loop of diagnostic update -> tendencies -> stepper -> monitor.store -> advance time."
step = "S03"
date = "2026-07-09"

[[ref]]
