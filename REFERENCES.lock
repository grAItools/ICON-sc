taken = "Substepping semantics donor for symcon Subcycle: per-section integer substeps clamped to >=1 (max(substeps, 1)); a substepped section integrates with timestep/substeps applied substeps times, chaining each provisional state into the next call. symcon S03 lifts this into a standalone Subcycle(stepper, n=None, ratio_provider=None) wrapper (architecture SS4.2: the generic combinator survives outside DynamicalCore); ratio_provider (CFL-adaptive style) is symcon's addition per SPEC, called once per outer step with the current state."
step = "S03"
date = "2026-07-09"
