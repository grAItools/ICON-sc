taken = "Ordering + cadence semantics for the S09 SCM composition. Fast physics: time splitting ('also known as sequential-update split'), calling sequence surface transfer -> saturation adjustment -> land-surface -> turbulent diffusion -> microphysics -> saturation adjustment again 'to ensure that vapor and liquid phase are in equilibrium before entering the slow physics parameterizations' — the SCM subset with only satad+microphysics present is therefore satad -> mphys -> satad, encoded as SCM_FAST_ORDER with machine-checkable constraints mphys.must_follow=('satad',), mphys.must_precede=('satad',). Slow physics: treated parallel-split, stepped independently from the state left by the latest fast process, tendencies (ddt vn/T/rho-qx) 'kept constant between two successive calls' and acting as forcing terms consumed inside dynamics/transport — the piecewise-constant bus semantics the S09 PrescribedCooling -> icon:ddt_temperature_slow -> ApplySlowTendencies chain exercises. Cadence rule §3.7.1: 'If the slow physics time step is not a multiple of the advective time step, it is automatically rounded up to the next advective time step' — NOTE: the frozen S03 CallingFrequency rounds to the NEAREST multiple (ties up), not always up; disagreement recorded in S09 STATUS.md (S03 interface is frozen; for the S09 preset dt_slow = 10·dt exactly, where both rules coincide)."
step = "S09"
date = "2026-07-10"

