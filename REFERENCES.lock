taken = "S10 satad functional core + IFT residual (PLAN item 4: 'read the exact residual once more'). Residual f(T*) = T* - T0 + lwdocvd*(qsat_rho(T*,rho) - qv) with lwdocvd = latent_heat_vaporization(T0)/cvd held constant over the iteration (computed from the INITIAL temperature - the IFT closure must carry d lwdocvd/dT0 = ((1850.0-cpl) - rv)/cvd through the chain rule); Newton update T_new = T - f/f', f' = 1 + lwdocvd*dqsatdT_rho(T, qsat_rho(T,rho)); subsaturated shortcut T_after = T - lwdocvd*qc with qv+qc <= qsat_rho(T_after,rho) bypassing the solve; iteration semantics replicated for T0<->F equivalence: init current=T-2*tol/next=T, per-point newton_iteration_mask = |current-next| > tolerance recomputed on all points each round, converged points frozen (copied through), global loop while any(mask), ConvergenceError past max_iter=10 (F-tier: bounded while_loop, no data-dependent raise under jit - deviation in STATUS); tendency egress (T*-T)/dt, (qsat_rho(T*,rho)-qv)/dt, (max(qv+qc-qsat_rho(T*,rho), zqwmin=1e-20)-qc)/dt; subsaturated egress ((T_after-T)/dt, qc/dt, -qc/dt). Verified identical closure formulas (Tetens TETENS_P0/AW/BW/DER, latent heat 1850.0-cpl literal) as mined in S07."
