taken = "Coupling definitions implemented verbatim: FC (2.8) E0(psi,dt;D+P); LFC (2.9) E0(psi,dt;D+P^n) with P^n frozen at the step-initial state; PS (2.10) each process integrated independently from psi^n, recombination psi^{n+1}=sum_l psi_l^{n+1}-L*psi^n (2.10d); STS (2.11) psi_0=E0(psi^n,dt;D), psi_l=E_l(psi^n,dt;P_l+(psi_{l-1}^{n+1}-psi^n)/dt) — the forcing always uses the step-initial psi^n; SUS (2.12) chained correctors; SSUS (2.13a-e) reverse pass over lam*dt with E_l^*, core over dt, forward pass over (1-lam)*dt, E_l^* != E_l explicitly legal (SS2.3.5). Expected measured orders (Table 2.1 + SS2.4.1 discussion): FC unconditionally 2; LFC/PS/STS/SUS effectively 1 (their second-order clauses rarely hold); SSUS second-order iff lam=1/2. DynamicalCore (SS3.5, Fig 3.9/3.10): slow tendencies enter as an input port held constant across the step; fast_tendency_component (ConcurrentCoupling) evaluated once per stage on the latest provisional state; super-fast tier substeps each stage with substep dt = dt/N and per-stage substep counts proportional to the stage fractions (Fig 3.10: N=6, 3-stage WS-RK fractions 1/3,1/2,1 -> 2,3,6 substeps). Burgers experiment (SS2.5.2): diffusion treated as the parameterization, advection as dynamics, EOC measured over a dt ladder — symcon's acceptance 2 transposes this to 1-D with a relaxation physics term and self-convergence pairs."
step = "S04"
date = "2026-07-09"

