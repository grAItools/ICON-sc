commit = "2025 edition (local PDF references/icon-model-tutorial-2025.pdf; see references/README.md)"
paths = ["§3.7.2 Fast and Slow Processes (pp. 92-93)"]
taken = "Coupling-position ground truth for SaturationAdjustment.coupling_constraints (SPEC S07): fast processes are treated with time splitting ('also known as sequential-update split'), each sequentially updating the state — hence admissible_operators={'sequential_update_splitting'}. Calling sequence: surface transfer -> saturation adjustment -> land-surface -> turbulent diffusion -> microphysics -> saturation adjustment again, 'in order to ensure that vapor and liquid phase are in equilibrium before entering the slow physics parameterizations'; satad thus appears twice per step (architecture §4.3 NWP_FAST_ORDER). Exceptions (surface transfer + land at old time level) do not involve satad."
step = "S07"
date = "2026-07-10"
