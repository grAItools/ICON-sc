[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "symcon-icon"
version = "0.1.0"
description = "symcon ICON model: grid stack, ICON components, presets, ingestion, variable registry"
readme = "README.md"
license = { text = "BSD-3-Clause" }
requires-python = ">=3.10"
dependencies = [
  "symcon-core",
  "icon4py-common>=0.2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/symcon"]
