[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "symcon-core"
version = "0.1.0"
description = "symcon composition framework: state/vault/plan, contracts, coupling algebra, comm, context, driver, generic I/O"
readme = "README.md"
license = { text = "BSD-3-Clause" }
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.23.3",
  # S02 state layer: boundary DataArrays, canonical-units identity checks (negotiation
  # only), cftime-aware time handling. Lower bounds only; constraints/ pins exact sets.
  "xarray>=2024.1",
  "pint>=0.23",
  "cftime>=1.6",
  # S03 io/netcdf.py (NetCDFMonitor): xarray's netcdf4 engine. Generic I/O is part of
  # symcon-core's mandate (package description); lower bound only.
  "netcdf4>=1.6",
]

# Extras per the repo layout document §1. Lower bounds only; constraints/ pins exact sets.
[project.optional-dependencies]
gpu = ["cupy-cuda12x>=13.0"]
jax = ["jax>=0.6.0", "mpi4jax>=0.6.0"]
mpi = ["mpi4py>=3.1.5", "ghex>=0.7.0"]
native = ["cffi>=1.16", "cmake>=3.28", "scikit-build-core>=0.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/symcon"]
