# Skeleton (S01): runs the gpu-marked subset on a hosted runner, where every test
# must *skip* cleanly (no CUDA device). Real GPU execution moves to a self-hosted
# runner with constraints/gpu-cuda12.txt once gpu-marked tests exist (S02+).
name: test-gpu

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gpu-skip-cleanly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"
      - run: uv sync --locked
      - name: gpu-marked tests skip (not fail) without a device
        run: uv run pytest packages -m gpu -ra
