name: test-cpu

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Acceptance path: clean checkout -> uv sync -> pytest (workspace lockfile).
  locked:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"
      - run: uv sync --locked
      - name: log host CPU + numpy float64 dispatch (issue #11 triage)
        run: |
          lscpu | grep -m1 'Model name'
          uv run python -c "import numpy as np; print('float64 exp dispatch:', np.lib.introspect.opt_func_info(func_name='exp', signature='float64')['exp'])"
      - run: uv run pytest packages -m "not gpu and not mpi" -ra

  # Constraint-set path: editable installs against each pinned environment set.
  constraints:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        constraints: [cpu-ci]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - name: install under constraints/${{ matrix.constraints }}.txt
        # --managed-python (issue #8): without it, "3.12" resolves to the runner
        # image's system /usr/bin/python3.12 (Ubuntu GCC 3.12.3), whose allocator
        # layout intermittently lands in a churny steady state that fails the
        # layout-sensitive tracemalloc bar of test_plan_zero_traffic.py (reproduced
        # locally: GCC 3.12.3 ~15% dirty launches with the exact CI signature; uv's
        # Clang builds 0/90 dirty). The 3.10 leg was always managed (no system 3.10),
        # so the flake looked 3.12-only. Keep both legs on managed builds.
        run: |
          uv venv --clear --managed-python --python ${{ matrix.python }}
          uv pip install --prerelease=allow \
            -e packages/icon-sc-core -e packages/icon-sc-icon -e packages/icon-sc-bridges \
            -c constraints/${{ matrix.constraints }}.txt \
            pytest pytest-mpi hypothesis import-linter
      - name: pinned icon4py imports (SPEC S01 acceptance 5)
        run: .venv/bin/python -c "import icon4py.model.common"
      - name: log host CPU + numpy float64 dispatch (issue #11 triage)
        run: |
          lscpu | grep -m1 'Model name'
          .venv/bin/python -c "import numpy as np; print('float64 exp dispatch:', np.lib.introspect.opt_func_info(func_name='exp', signature='float64')['exp'])"
      - run: .venv/bin/pytest packages -m "not gpu and not mpi" -ra

  # Example smoke (SPEC S09 acceptance 1): the SCM run script must stay green
  # and fast (< 60 s CPU on the embedded backend; generous CI-jitter timeout).
  examples-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"
      - run: uv sync --locked
      - run: timeout 300 uv run python examples/01_scm_column.py --hours 1 --output /tmp/scm_column.nc

  # Standalone-install path: core must install and import without icon/bridges.
  core-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - run: |
          uv venv --clear
          uv pip install -e packages/icon-sc-core
          .venv/bin/python -c "import icon_sc.core, icon_sc.core.testing"
