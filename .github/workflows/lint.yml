name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"
      - run: uv sync --locked
      - name: ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: mypy --strict on symcon-core
        run: uv run mypy --strict -p symcon.core
      - name: import-linter contracts
        run: uv run lint-imports
