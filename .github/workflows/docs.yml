# task 28: docs build + GitHub Pages deploy (artifact flow — no gh-pages branch;
# built HTML in a git branch would collide with the no-generated-artifacts
# discipline). One-time human repo setting required: Pages -> Source: GitHub Actions.
name: docs
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
# The expression must be quoted inside a flow mapping to be valid YAML (the
# prompt's yaml.safe_load verify fails on the unquoted form).
concurrency: { group: "pages-${{ github.ref }}", cancel-in-progress: true }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run sphinx-build -b html docs docs/_build/html
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs/_build/html }
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    permissions: { pages: write, id-token: write }
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
