repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy-core
        name: mypy --strict on symcon-core
        entry: uv run mypy --strict -p symcon.core
        language: system
        types: [python]
        files: ^packages/symcon-core/src/
        pass_filenames: false
      - id: lint-imports
        name: import-linter contracts
        entry: uv run lint-imports
        language: system
        types: [python]
        pass_filenames: false
